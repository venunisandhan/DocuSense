services:

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PENDING_ROLE_TOKEN_SECRET: ${PENDING_ROLE_TOKEN_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      S3_ENDPOINT: https://s3.${S3_REGION}.amazonaws.com
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: "false"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2}
      GEMINI_GENERATION_MODEL: ${GEMINI_GENERATION_MODEL:-gemini-3.1-flash-lite}
      VECTOR_SIMILARITY_THRESHOLD: ${VECTOR_SIMILARITY_THRESHOLD:-0.5}
      CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS:-2000}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-200}
      REDIS_URL: redis://redis:6379
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}

  frontend:
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${CLIENT_ORIGIN}/api/v1
    restart: always
    depends_on:
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  redis_data: